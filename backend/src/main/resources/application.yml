spring:
  application:
    name: battletech-campaign-backend
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id-here}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret-here}
            scope:
              - profile
              - email
            # Use the template to let Spring handle the base URL dynamically
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: email
server:
  port: 8080

logging:
  level:
    root: INFO
    com.hotspotscamp: DEBUG
