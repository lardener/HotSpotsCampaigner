spring:
  application:
    name: battletech-campaign-backend
  r2dbc:
    url: r2dbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:BT_Campaigner}${MYSQL_PARAMS:}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    pool:
      initial-size: 1
      max-size: 10
      max-idle-time: 30m
      max-life-time: 60m
      validation-query: SELECT 1
      max-create-connection-time: 5s
      max-acquire-time: 30s
  # Flyway database migrations (replaces destructive schema.sql init)
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Baseline the existing OVH production DB so V1 is recorded without
    # re-creating (and dropping) the already-populated schema.
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id-here}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret-here}
            scope:
              - profile
              - email
            # Use the template to let Spring handle the base URL dynamically
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: email
server:
  port: 8080

logging:
  level:
    root: INFO
    com.hotspotscamp: INFO
