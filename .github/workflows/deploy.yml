name: Deploy to OVH Kubernetes

on:
    workflow_dispatch:
        inputs:
            environment:
                description: Target namespace
                required: true
                default: battletech-campaigner
                type: string

permissions:
    contents: read

jobs:
    deploy:
        name: Build, Push & Apply Manifests
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment }}
        env:
            REGISTRY: vq9701ff.c1.va1.container-registry.ovh.us/library
            NAMESPACE: ${{ github.event.inputs.environment }}
            IMAGE_TAG: ${{ github.sha }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to OVH Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.OVH_REGISTRY_USERNAME }}
                  password: ${{ secrets.OVH_REGISTRY_PASSWORD }}

            - name: Build & push backend image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.backend
                  push: true
                  tags: ${{ env.REGISTRY }}/hotspotscampaigner-backend:${{ env.IMAGE_TAG }}

            - name: Build & push frontend image (K8s config: empty VITE_API_BASE_URL -> /api fallback)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.frontend
                  push: true
                  build-args: |
                      VITE_API_BASE_URL=
                  tags: ${{ env.REGISTRY }}/hotspotscampaigner-frontend:${{ env.IMAGE_TAG }}

            - name: Install kubectl
              uses: azure/setup-kubectl@v4
              with:
                  version: v1.32.0

            - name: Configure kubeconfig
              run: |
                  mkdir -p $HOME/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
                  chmod 600 $HOME/.kube/config

            - name: Update image tags in manifests
              run: |
                  sed -i "s|image: ${REGISTRY}/hotspotscampaigner-backend:.*|image: ${REGISTRY}/hotspotscampaigner-backend:${IMAGE_TAG}|" ovhcloud-backend-deployment.yaml
                  sed -i "s|image: ${REGISTRY}/hotspotscampaigner-frontend:.*|image: ${REGISTRY}/hotspotscampaigner-frontend:${IMAGE_TAG}|" ovhcloud-frontend-deployment.yaml

            - name: Apply Kubernetes manifests
              run: |
                  kubectl apply -f ovhcloud-namespace.yaml
                  kubectl apply -f ovhcloud-backend-configmap.yaml
                  kubectl apply -f ovhcloud-frontend-configmap.yaml
                  kubectl apply -f ovhcloud-backend-secret.yaml
                  kubectl apply -f ovhcloud-google-secret.yaml
                  kubectl apply -f ovhcloud-backend-deployment.yaml
                  kubectl apply -f ovhcloud-frontend-deployment.yaml
                  kubectl apply -f ovhcloud-backend-ingress.yaml
                  kubectl apply -f ovhcloud-frontend-ingress.yaml
                  kubectl apply -f ovhcloud-ingress.yaml

            - name: Wait for rollout
              run: |
                  kubectl -n "$NAMESPACE" rollout status deployment/backend-deployment --timeout=300s
                  kubectl -n "$NAMESPACE" rollout status deployment/frontend-deployment --timeout=300s
