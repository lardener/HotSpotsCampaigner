name: Container Build & Scan

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile.backend'
      - 'Dockerfile.frontend'
      - 'schema.graphqls'
      - '.github/workflows/container-scan.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile.backend'
      - 'Dockerfile.frontend'
      - 'schema.graphqls'
      - '.github/workflows/container-scan.yml'

jobs:
  scan:
    name: Build images and scan with Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: hotspotscampaigner-backend:scan

      - name: 'Build frontend image (K8s config: empty VITE_API_BASE_URL -> /api fallback)'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          build-args: |
            VITE_API_BASE_URL=
          tags: hotspotscampaigner-frontend:scan

      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: hotspotscampaigner-backend:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: hotspotscampaigner-frontend:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
