services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: battletech-backend
    ports:
      - '8080:8080'
    env_file: .env
    # Override or supplement .env for local Docker networking
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SERVER_FORWARD_HEADERS_STRATEGY=none
      - SERVER_SERVLET_SESSION_COOKIE_SECURE=false
      - SPRING_WEBFLUX_SESSION_TIMEOUT=${SESSION_TIMEOUT:-30m}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI=${OAUTH_REDIRECT_URI}
    depends_on:
      - mysql
    networks:
      - battletech-network

  mysql:
    build:
      context: .
      dockerfile: Dockerfile.database
      args:
        - MYSQL_DATABASE=${MYSQL_DATABASE}
        - MYSQL_USER=${MYSQL_USER}
        - MYSQL_PASSWORD=${MYSQL_PASSWORD}
        - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    container_name: battletech-db
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - battletech-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8080
    container_name: battletech-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - battletech-network

networks:
  battletech-network:
    driver: bridge

volumes:
  mysql_data:
    name: battletech_mysql_data