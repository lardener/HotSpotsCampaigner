
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: battletech-backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_WEBFLUX_SESSION_TIMEOUT=${SESSION_TIMEOUT:-30m}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI=http://localhost:8080/login/oauth2/code/google
    depends_on:
      - mysql
    networks:
      - battletech-network

  mysql:
    build:
      context: .
      dockerfile: Dockerfile.database
      args:
        - MYSQL_DATABASE=${MYSQL_DATABASE}
        - MYSQL_USER=${MYSQL_USER}
        - MYSQL_PASSWORD=${MYSQL_PASSWORD}
        - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    container_name: battletech-db
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - battletech-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      # Mounts your local public folder to the container for live-reloading during development
      - ./frontend/public:/app/public
    container_name: battletech-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - battletech-network

networks:
  battletech-network:
    driver: bridge

volumes:
  mysql_data:
    name: battletech_mysql_data
