# Frontend Deployment (React, served by Nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: battletech-campaigner
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: vq9701ff.c1.va1.container-registry.ovh.us/library/hotspotscampaigner-frontend:1.0.5
          ports:
            - containerPort: 3000 # Updated to match your internal app port
          env:
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: VITE_API_BASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: battletech-campaigner
spec:
  type: ClusterIP # Wired to the Ingress, which provides the public IP
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
