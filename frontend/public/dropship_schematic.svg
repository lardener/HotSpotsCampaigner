<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#004b6e" stroke-width="0.5" opacity="0.4"/>
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#006699" stroke-width="1" opacity="0.6"/>
    </pattern>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#001a2e" />
  <rect width="800" height="600" fill="url(#blueprint-grid)" />

  <!-- Outer Border -->
  <rect x="15" y="15" width="770" height="570" fill="none" stroke="#0088cc" stroke-width="2" opacity="0.8"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#0088cc" stroke-width="1" opacity="0.3"/>

  <!-- SCHEMATIC GRAPHICS Group -->
  <g stroke="#00ddff" stroke-width="1.5" fill="none" filter="url(#glow)">
    
    <!-- ================= HULL OUTLINE ================= -->
    <!-- Main Wedge Body -->
    <path d="M 400 70 
             L 560 380 
             L 530 460 
             L 490 460 
             L 480 480 
             L 320 480 
             L 310 460 
             L 270 460 
             L 240 380 Z" 
          stroke-width="2.5" />

    <!-- Nose Cone / Bridge Window Area -->
    <path d="M 370 130 L 400 70 L 430 130 Z" opacity="0.7"/>
    <line x1="360" y1="150" x2="440" y2="150" />
    <line x1="380" y1="130" x2="420" y2="130" />

    <!-- Forward Weapon Bays (SRM/Laser Ports) -->
    <rect x="340" y="170" width="20" height="30" rx="3" />
    <circle cx="350" cy="185" r="3" fill="#00ddff" />
    <rect x="440" y="170" width="20" height="30" rx="3" />
    <circle cx="450" cy="185" r="3" fill="#00ddff" />

    <!-- ================= 'MECH BAYS (PORT & STARBOARD) ================= -->
    <!-- Left 'Mech Bay Doors -->
    <g id="port-mech-bay">
      <path d="M 290 280 L 340 280 L 340 380 L 270 380 Z" />
      <line x1="290" y1="280" x2="270" y2="380" />
      <line x1="315" y1="280" x2="305" y2="380" />
      <!-- Structural Panels -->
      <line x1="280" y1="330" x2="340" y2="330" opacity="0.6"/>
    </g>

    <!-- Right 'Mech Bay Doors -->
    <g id="starboard-mech-bay">
      <path d="M 510 280 L 460 280 L 460 380 L 530 380 Z" />
      <line x1="510" y1="280" x2="530" y2="380" />
      <line x1="485" y1="280" x2="495" y2="380" />
      <!-- Structural Panels -->
      <line x1="520" y1="330" x2="460" y2="330" opacity="0.6"/>
    </g>

    <!-- Centerline Structural Spine -->
    <line x1="400" y1="150" x2="400" y2="440" stroke-dasharray="5 5" opacity="0.7"/>

    <!-- Internal Bulkheads & Engineering Deck Cross-sections -->
    <path d="M 340 250 L 460 250" opacity="0.8"/>
    <path d="M 340 410 L 460 410" opacity="0.8"/>
    
    <!-- Avionics / Crew Quarters Core Area -->
    <rect x="360" y="210" width="80" height="40" opacity="0.6"/>
    <text x="400" y="235" font-family="monospace" font-size="9" fill="#00ddff" text-anchor="middle" stroke="none">CREW CORE</text>

    <!-- ================= AERO SPACE FIGHTER HANGARS ================= -->
    <rect x="350" y="420" width="40" height="30" opacity="0.7"/>
    <text x="370" y="438" font-family="monospace" font-size="8" fill="#00ddff" text-anchor="middle" stroke="none">ASF 1</text>
    
    <rect x="410" y="420" width="40" height="30" opacity="0.7"/>
    <text x="430" y="438" font-family="monospace" font-size="8" fill="#00ddff" text-anchor="middle" stroke="none">ASF 2</text>

    <!-- ================= REAR ENGINES & THRUSTERS ================= -->
    <!-- Main Center Drive -->
    <rect x="370" y="480" width="60" height="25" />
    <path d="M 365 505 L 435 505 L 425 525 L 375 525 Z" fill="#004466" opacity="0.3"/>
    
    <!-- Port Outboard Thruster -->
    <rect x="325" y="480" width="35" height="20" />
    <path d="M 322 500 L 362 500 L 357 515 L 327 515 Z" fill="#004466" opacity="0.3"/>

    <!-- Starboard Outboard Thruster -->
    <rect x="440" y="480" width="35" height="20" />
    <path d="M 438 500 L 478 500 L 473 515 L 443 515 Z" fill="#004466" opacity="0.3"/>

    <!-- Thrust Vector Lines -->
    <line x1="335" y1="515" x2="330" y2="540" opacity="0.5"/>
    <line x1="350" y1="515" x2="345" y2="540" opacity="0.5"/>
    <line x1="385" y1="525" x2="380" y2="555" opacity="0.5"/>
    <line x1="400" y1="525" x2="400" y2="555" opacity="0.5"/>
    <line x1="415" y1="525" x2="420" y2="555" opacity="0.5"/>
    <line x1="450" y1="500" x2="455" y2="540" opacity="0.5"/>
    <line x1="465" y1="500" x2="470" y2="540" opacity="0.5"/>

  </g>

  <!-- ================= BLUEPRINT LABELS & TEXT ================= -->
  <g font-family="monospace" fill="#00ddff" text-anchor="start">
    <!-- Technical Data Block (Bottom Left) -->
    <text x="40" y="470" font-size="14" font-weight="bold" letter-spacing="1">DES: LEOPARD-CLASS</text>
    <text x="40" y="490" font-size="11" opacity="0.8">REGISTRY: INNER SPHERE standard</text>
    <text x="40" y="505" font-size="11" opacity="0.8">TONNAGE: 1,900 TONS</text>
    <text x="40" y="520" font-size="11" opacity="0.8">CAPACITY: 4 'MECHS / 2 FIGHTERS</text>
    <text x="40" y="535" font-size="11" opacity="0.8">ARMAMENT: 2x LRM-20, 2x PPC, 5x Large Laser</text>
    <text x="40" y="550" font-size="11" opacity="0.8">SAFE THRUST: 4.0 G</text>

    <!-- Blueprint Header (Top Left) -->
    <text x="40" y="60" font-size="22" font-weight="bold" letter-spacing="2">NAVIS SHIPYARDS DIAGRAM</text>
    <line x1="40" y1="70" x2="330" y2="70" stroke="#00ddff" stroke-width="2"/>
    <text x="40" y="88" font-size="10" opacity="0.7">SECURE DATA FEED // FOR TACTICAL USE ONLY</text>

    <!-- Callouts & Indicator Lines -->
    <!-- Bridge Callout -->
    <line x1="400" y1="95" x2="490" y2="120" stroke="#00ddff" stroke-width="0.75" stroke-dasharray="2 2"/>
    <circle cx="400" cy="95" r="3" fill="#00ddff"/>
    <text x="495" y="123" font-size="11">01. COMMAND BRIDGE</text>

    <!-- Weapon Array Callout -->
    <line x1="350" y1="185" x2="210" y2="185" stroke="#00ddff" stroke-width="0.75" stroke-dasharray="2 2"/>
    <circle cx="350" cy="185" r="3" fill="#00ddff"/>
    <text x="110" y="188" font-size="11">02. FWD WEAPONS BAY</text>

    <!-- 'Mech Hangar Callout -->
    <line x1="310" y1="330" x2="190" y2="300" stroke="#00ddff" stroke-width="0.75" stroke-dasharray="2 2"/>
    <circle cx="310" cy="330" r="3" fill="#00ddff"/>
    <text x="80" y="298" font-size="11">03. 'MECH DROP BAY (x4)</text>

    <!-- Drive System Callout -->
    <line x1="420" y1="500" x2="570" y2="490" stroke="#00ddff" stroke-width="0.75" stroke-dasharray="2 2"/>
    <circle cx="420" cy="500" r="3" fill="#00ddff"/>
    <text x="580" y="493" font-size="11">04. MAIN FUSION DRIVE</text>
    
    <!-- Dimensions / Scale Indicators -->
    <g opacity="0.5" stroke="#00ddff" stroke-width="1">
      <!-- Width Indicator -->
      <line x1="240" y1="400" x2="210" y2="400"/>
      <line x1="560" y1="400" x2="590" y2="400"/>
      <line x1="220" y1="400" x2="580" y2="400" stroke-dasharray="4 4"/>
      <text x="400" y="395" font-size="10" text-anchor="middle" fill="#00ddff" stroke="none">HULL BEAM: ~50m</text>
    </g>
  </g>
</svg>
